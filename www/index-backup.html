<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AstraSpin</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="app-container">

    <header class="app-header fade-in">
        <div class="app-title">
            Astra<span>Spin</span>
        </div>
    </header>


    <section class="glass-card fade-in">
        <h2>🎁 Welcome to AstraSpin</h2>
        <p>
            Play premium mini games and enjoy exciting rewards.
        </p>

        <br>

        <button class="primary-btn">
            Start Playing
        </button>
    </section>


    <br>


    <section class="glass-card fade-in">

        <h3>🎮 Games</h3>

        <br>

        <div class="game-grid">

            <div class="game-card">
                <h2>🎯</h2>
                <p>Spin Game</p>
            </div>


            <div class="game-card">
                <h2>🧩</h2>
                <p>Puzzle</p>
            </div>


            <div class="game-card">
                <h2>🚀</h2>
                <p>Jump</p>
            </div>


            <div class="game-card">
                <h2>🏆</h2>
                <p>Rewards</p>
            </div>

        </div>

    </section>


</div>

</body>
</html>
